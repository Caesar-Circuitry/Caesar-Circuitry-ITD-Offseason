name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1 # Reduce fetch depth to speed up repository checkout

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle # Cache Gradle dependencies for faster builds

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build --info --parallel # Enable parallel build to utilize multiple cores

    - name: Run Unit Tests
      run: ./gradlew test --parallel # Run tests in parallel for speed

    - name: Run Lint Checks
      run: ./gradlew lint --parallel # Run lint checks in parallel

    - name: Assemble Debug APK
      run: ./gradlew assembleDebug --parallel # Build APK in parallel
